name: Release

# Тег вида v1.2.3 — соберёт .exe (Windows) и .AppImage (Linux) и опубликует
# их в GitHub Release для этого тега. workflow_dispatch — для ручного запуска
# без тега (например, чтобы проверить, что сборка вообще проходит).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist_script: dist:win
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            dist_script: dist:linux
            artifacts: |
              release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # MAIN_VITE_YANDEX_CLIENT_ID / MAIN_VITE_YANDEX_REDIRECT_URI должны
      # быть заведены как Repository secrets (Settings → Secrets and
      # variables → Actions) — именно под этими именами, см. README.
      - name: Build and package
        run: npm run ${{ matrix.dist_script }}
        env:
          MAIN_VITE_YANDEX_CLIENT_ID: ${{ secrets.MAIN_VITE_YANDEX_CLIENT_ID }}
          MAIN_VITE_YANDEX_REDIRECT_URI: ${{ secrets.MAIN_VITE_YANDEX_REDIRECT_URI }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
